{% extends "base.html" %}

{% block title %}Server Error - WiFi Password Retriever{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto text-center">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="display-1 text-danger">500</h1>

            </div>
        </div>
    </div>
</div>
{% endblock %}
